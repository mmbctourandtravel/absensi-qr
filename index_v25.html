<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MMBC QR Attendance v2.5</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
<script src="https://unpkg.com/html5-qrcode"></script>

<script>

const API="https://script.google.com/macros/s/AKfycbzKcfMXWKhdLhRZKNNhxjFxPZu8Pcs4OTqYxchHS4Ua4geP1lkqjv91giu7kftktbmH/exec";

let proses=false;

let qr=new Html5Qrcode("reader");

qr.start(

    { facingMode:"environment" },

    {

        fps:10,

        qrbox:250

    },

    sukses

);

function sukses(decodedText){

    if(proses) return;

    proses=true;

    qr.pause();

const hasil=document.getElementById("hasil");

hasil.className="proses animasi";

hasil.innerHTML=`
<div class="icon">⏳</div>
<div class="judul">Memproses...</div>
`;

    fetch(API,{

        method:"POST",

        body:JSON.stringify({
            id:decodedText
        })

    })

    .then(r=>r.json())

.then(res=>{

    console.log(res);

    const hasil=document.getElementById("hasil");

    if(res.sukses){

        hasil.className="sukses animasi";

hasil.innerHTML=`
<div class="icon">✅</div>

<div class="judul">
${res.tipe=="masuk" ? "ABSEN MASUK BERHASIL" : "ABSEN PULANG BERHASIL"}
</div>

<div class="nama">
${res.nama}
</div>

<div class="jam">
${new Date().toLocaleTimeString("id-ID")}
</div>
`;
    }else{

        hasil.className="gagal animasi";

hasil.innerHTML=`
<div class="icon">❌</div>

<div class="judul">
GAGAL
</div>

<div class="nama">
${res.pesan}
</div>
`;

    }

    setTimeout(()=>{

        hasil.innerHTML="Menunggu Scan...";

        proses=false;

        qr.resume();

    },3000);

})
    .catch(err=>{

        console.log(err);

        document.getElementById("hasil").innerHTML=
        "Server Error";

        proses=false;

        qr.resume();

    });

}

</script>
body{

    background:#eef3f8;

    font-family:Arial,sans-serif;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    padding:20px;

}

.container{

    width:380px;

    max-width:100%;

    background:white;

    border-radius:25px;

    padding:25px;

    box-shadow:0 15px 40px rgba(0,0,0,.15);

}

.logo{

    width:90px;

    height:90px;

    border-radius:50%;

    background:#1565c0;

    color:white;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:34px;

    font-weight:bold;

    margin:auto;

}

h1{

    margin-top:20px;

    text-align:center;

    color:#1565c0;

    font-size:30px;

}

.subtitle{

    text-align:center;

    color:#777;

    margin-top:10px;

    margin-bottom:25px;

}

#reader{

    width:100%;

    height:320px;

    border-radius:20px;

    background:#edf2f7;

    border:3px dashed #b0bec5;

    display:flex;

    justify-content:center;

    align-items:center;

    color:#90a4ae;

    font-size:22px;

}

#hasil{

    margin-top:25px;

    background:#ffffff;

    border-radius:20px;

    min-height:180px;

    padding:25px;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    text-align:center;

    box-shadow:0 8px 25px rgba(0,0,0,.12);

    transition:.3s;

    overflow:hidden;

    position:relative;

}

.icon{

    font-size:70px;

    margin-bottom:15px;

    animation:pop .4s ease;

}

.judul{

    font-size:28px;

    font-weight:bold;

    margin-bottom:12px;

}

.nama{

    font-size:34px;

    color:#1565c0;

    font-weight:bold;

    margin-top:15px;

    margin-bottom:10px;

}

.jam{

    font-size:20px;

    color:#666;

    margin-top:10px;

}

.sukses{

    background:#e8f5e9;

    border-top:8px solid #2ecc71;

}

.gagal{

    background:#ffebee;

    border-top:8px solid #e74c3c;

}

.proses{

    background:#f4f9ff;

    border-top:8px solid #3498db;

}
@keyframes pop{

    0%{

        transform:scale(.8);

        opacity:0;

    }

    100%{

        transform:scale(1);

        opacity:1;

    }

}

.animasi{

    animation:pop .35s ease;

}
.footer{

    text-align:center;

    margin-top:20px;

    color:#999;

    font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

M

</div>

<h1>

ABSENSI QR

</h1>

<div class="subtitle">

MMBC TOUR & TRAVEL

</div>

<div id="reader">

📷 Scanner QR

</div>

<div id="hasil">

Menunggu Scan...

</div>

<div class="footer">

Version 2.5 Clean Build

</div>

</div>

</body>

</html>
