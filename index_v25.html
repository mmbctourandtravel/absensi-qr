<!DOCTYPE html>
<html lang="id">
<head>

<title>MMBC QR Attendance v2.5</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#eef3f8;

    font-family:Arial,sans-serif;

    display:flex;

    justify-content:center;

    align-items:center;

    min-height:100vh;

    padding:20px;

}

.container{

    width:380px;

    max-width:100%;

    background:white;

    border-radius:25px;

    padding:25px;

}

.logo{

    width:90px;

    height:90px;

    border-radius:50%;

    background:#1565c0;

    color:white;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:34px;

    font-weight:bold;

    margin:auto;

}

h1{

    margin-top:20px;

    text-align:center;

    color:#1565c0;

    font-size:30px;

}

.subtitle{

    text-align:center;

    color:#777;

    margin-top:10px;

    margin-bottom:25px;

}

#reader{

    width:100%;

    height:320px;

    border-radius:20px;

    background:#edf2f7;

    border:3px dashed #b0bec5;

    display:flex;

    justify-content:center;

    align-items:center;

    color:#90a4ae;

    font-size:22px;

}

#hasil{

    margin-top:25px;

    background:#f8f9fb;

    border-radius:20px;

    min-height:140px;

    display:flex;

    justify-content:center;

    align-items:center;

    font-size:24px;

    font-weight:bold;

    color:#555;

}

.footer{

    text-align:center;

    margin-top:20px;

    color:#999;

    font-size:14px;

}

</style>

</head>

<body>

M

</div>

</h1>
