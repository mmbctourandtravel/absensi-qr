<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MMBC QR Attendance</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#eef3f8;
    font-family:Arial,sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    padding:20px;

}

.container{

    width:380px;
    max-width:100%;

    background:#ffffff;

    border-radius:25px;

    padding:25px;

    box-shadow:0 15px 40px rgba(0,0,0,.15);

}

.logo{

    width:90px;
    height:90px;

    border-radius:50%;

    background:#1565c0;

    color:#ffffff;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:34px;
    font-weight:bold;

    margin:auto;

}

h1{

    margin-top:20px;

    text-align:center;

    color:#1565c0;

    font-size:30px;

}

.subtitle{

    margin-top:10px;
    margin-bottom:25px;

    text-align:center;

    color:#777;

}

#reader{

    width:100%;
    min-height:320px;

    border-radius:20px;

    border:2px dashed #90caf9;

    background:#f8fbff;

}

#hasil{

    margin-top:25px;

    background:#f8f9fb;

    border-radius:20px;

    min-height:120px;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:22px;
    font-weight:bold;

    color:#666;

}

.footer{

    margin-top:20px;

    text-align:center;

    color:#999;

    font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

M

</div>

<h1>

ABSENSI QR

</h1>

<div class="subtitle">

MMBC TOUR & TRAVEL

</div>

<div id="reader"></div>

<div id="hasil">

Menunggu Scan...

</div>

<div class="footer">

Version 3.0 FINAL

</div>

</div>
<script>
const API = "https://script.google.com/macros/s/AKfycbzKcfMXWKhdLhRZKNNhxjFxPZu8Pcs4OTqYxchHS4Ua4geP1lkqjv91giu7kftktbmH/exec";
const qr = new Html5Qrcode("reader");

qr.start(
    { facingMode: "environment" },
    {
        fps:10,
        qrbox:250
    },
    (decodedText)=>{

    alert(decodedText);

    fetch(API,{
        method:"POST",
        body:JSON.stringify({
            id:decodedText
        })
    })

    .then(r=>r.json())

.then(res=>{

    console.log(res);

    if(res.sukses){

        if(res.tipe=="masuk"){

            document.getElementById("hasil").innerHTML=
            "✅ Selamat Datang<br><b>"+res.nama+"</b><br>Absen Masuk Berhasil";

        }else{

            document.getElementById("hasil").innerHTML=
            "👋 Sampai Jumpa<br><b>"+res.nama+"</b><br>Absen Pulang Berhasil";

        }

    }else{

        document.getElementById("hasil").innerHTML=
        "❌ "+res.pesan;

    }

})

.catch(err=>{

    console.log(err);

    document.getElementById("hasil").innerHTML=
    "❌ Gagal mengirim data";

});
</script>
</body>

</html>
