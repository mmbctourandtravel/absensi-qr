<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Absensi QR MMBC</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
margin:0;
padding:25px;
}

h2{
color:#1565c0;
}

#reader{
width:320px;
margin:auto;
}

#hasil{

margin:25px auto;
padding:30px;
width:320px;
min-height:180px;

background:#ffffff;

border-radius:18px;

box-shadow:0 8px 25px rgba(0,0,0,.18);

font-size:22px;
font-weight:bold;

display:flex;
flex-direction:column;
justify-content:center;
align-items:center;

transition:all .35s ease;

}
.sukses{

background:#2ecc71;
color:white;

}

.gagal{

background:#e74c3c;
color:white;

}

.icon{

font-size:60px;
margin-bottom:15px;

}

.judul{

font-size:30px;
font-weight:bold;

margin-bottom:10px;

}

.nama{

font-size:28px;

margin-top:15px;

}

.jam{

margin-top:18px;

font-size:24px;

font-weight:normal;

}

.berhasil{

color:green;

}

.gagal{

color:red;

}

</style>

</head>

<body>

<h2>ABSENSI QR MMBC</h2>

<div id="reader"></div>

<div id="hasil">

Arahkan QR ke Kamera

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzKcfMXWKhdLhRZKNNhxjFxPZu8Pcs4OTqYxchHS4Ua4geP1lkqjv91giu7kftktbmH/exec";

const qr=new Html5Qrcode("reader");

let proses=false;

function sukses(decodedText){

if(proses)return;

proses=true;

qr.pause();

fetch(API,{

method:"POST",

body:JSON.stringify({

id:decodedText

})

})

.then(r=>r.json())

.then(res=>{

const hasil=document.getElementById("hasil");

hasil.className="";

if(res.sukses){

if(res.tipe=="masuk"){

hasil.classList.add("berhasil");

hasil.innerHTML=
"✅ <br><br>Absen Masuk Berhasil<br><br><b>"+res.nama+"</b>";

}

else{

hasil.classList.add("berhasil");

hasil.innerHTML=
"👋<br><br>Absen Pulang Berhasil<br><br><b>"+res.nama+"</b>";

}

}

else{

hasil.classList.add("gagal");

hasil.innerHTML=
"❌<br><br>"+res.pesan;

}

setTimeout(()=>{

hasil.className="";

hasil.innerHTML="Arahkan QR ke Kamera";

proses=false;

qr.resume();

},3000);

})

.catch(()=>{

document.getElementById("hasil").innerHTML="Server Error";

proses=false;

qr.resume();

});

}

qr.start(

{

facingMode:"environment"

},

{

fps:10,

qrbox:250

},

sukses

);

</script>

</body>

</html>
