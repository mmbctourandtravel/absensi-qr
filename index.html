<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Absensi QR MMBC</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
margin:0;
padding:25px;
}

h2{
color:#1565c0;
}

#reader{
width:320px;
margin:auto;
}

#hasil{

margin-top:20px;
font-size:22px;
font-weight:bold;

padding:15px;

border-radius:10px;

background:white;

box-shadow:0 0 10px rgba(0,0,0,.15);

}

.berhasil{

color:green;

}

.gagal{

color:red;

}

</style>

</head>

<body>

<h2>ABSENSI QR MMBC</h2>

<div id="reader"></div>

<div id="hasil">

Arahkan QR ke Kamera

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzKcfMXWKhdLhRZKNNhxjFxPZu8Pcs4OTqYxchHS4Ua4geP1lkqjv91giu7kftktbmH/exec";

const qr=new Html5Qrcode("reader");

let proses=false;

function sukses(decodedText){

if(proses)return;

proses=true;
if (navigator.vibrate) {
    alert("Vibrate dijalankan");
    navigator.vibrate([200, 100, 200]);
}
qr.pause();

fetch(API,{

method:"POST",

body:JSON.stringify({

id:decodedText

})

})

.then(r=>r.json())

.then(res=>{

const hasil=document.getElementById("hasil");

hasil.className="";

if(res.sukses){

if(res.tipe=="masuk"){

hasil.classList.add("berhasil");

hasil.innerHTML=
"✅ <br><br>Absen Masuk Berhasil<br><br><b>"+res.nama+"</b>";

}

else{

hasil.classList.add("berhasil");

hasil.innerHTML=
"👋<br><br>Absen Pulang Berhasil<br><br><b>"+res.nama+"</b>";

}

}

else{

hasil.classList.add("gagal");

hasil.innerHTML=
"❌<br><br>"+res.pesan;

}

setTimeout(()=>{

hasil.className="";

hasil.innerHTML="Arahkan QR ke Kamera";

proses=false;

qr.resume();

},3000);

})

.catch(()=>{

document.getElementById("hasil").innerHTML="Server Error";

proses=false;

qr.resume();

});

}

qr.start(

{

facingMode:"environment"

},

{

fps:10,

qrbox:250

},

sukses

);

</script>

</body>

</html>
