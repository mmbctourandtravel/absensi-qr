<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Absensi QR MMBC</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f5f5;
text-align:center;
margin:0;
padding:25px;
}

h2{
color:#1565c0;
}

#reader{
width:320px;
margin:auto;
}

#hasil{

margin:25px auto;

padding:30px;

width:320px;

min-height:180px;

background:#ffffff;

border-radius:20px;

box-shadow:0 8px 25px rgba(0,0,0,.15);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

transition:.35s;

font-weight:bold;

font-size:24px;

}

.sukses{

background:#2ecc71;

color:white;

}

.gagal{

background:#e74c3c;

color:white;

}

.icon{

font-size:58px;

margin-bottom:12px;

}

.judul{

font-size:30px;

font-weight:bold;

margin-bottom:10px;

}

.nama{

font-size:28px;

margin-top:10px;

}

.jam{

font-size:22px;

margin-top:15px;

font-weight:normal;

}

</style>

</head>

<body>

<h2>ABSENSI QR MMBC</h2>

<div id="reader"></div>

<div id="hasil">

Arahkan QR ke Kamera

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzKcfMXWKhdLhRZKNNhxjFxPZu8Pcs4OTqYxchHS4Ua4geP1lkqjv91giu7kftktbmH/exec";

const qr=new Html5Qrcode("reader");

let proses=false;

function sukses(decodedText){

if(proses)return;

proses=true;

if (navigator.vibrate) {
    navigator.vibrate([200,100,200]);
}
const beep = document.getElementById("beep");
beep.currentTime = 0;
beep.play();
document.getElementById("reader").style.opacity="0.35";

qr.pause();

const hasil=document.getElementById("hasil");

hasil.className="";

hasil.innerHTML=`
<div style="font-size:60px;">⏳</div>
<div style="font-size:28px;font-weight:bold;">
Memproses...
</div>
`;

fetch(API,{

method:"POST",

body:JSON.stringify({

id:decodedText

})

})

.then(r=>r.json())

.then(res=>{

const hasil=document.getElementById("hasil");

hasil.className="";

if(res.sukses){

if(res.tipe=="masuk"){

hasil.className="sukses";

hasil.innerHTML=`
<div class="icon">✅</div>
<div class="judul">ABSEN MASUK BERHASIL</div>
<div class="nama">${res.nama}</div>
<div class="jam">${new Date().toLocaleTimeString('id-ID')}</div>
`;

}

else{

hasil.classList.add("berhasil");

hasil.innerHTML=
"👋<br><br>Absen Pulang Berhasil<br><br><b>"+res.nama+"</b>";

}

}

else{

hasil.classList.add("gagal");

hasil.innerHTML=
"❌<br><br>"+res.pesan;

}

setTimeout(()=>{

hasil.className="";

hasil.innerHTML="Arahkan QR ke Kamera";

document.getElementById("reader").style.opacity="1";

proses=false;

qr.resume();

},3000);

})

.catch(()=>{

document.getElementById("hasil").innerHTML="Server Error";

proses=false;

qr.resume();

});

}
function mulaiKamera(){

    document.getElementById("reader").style.display="block";
 document.getElementById("reader").style.opacity="1";
    qr.start(

        {
            facingMode:"environment"
        },

        {
            fps:10,
            qrbox:250
        },

        sukses

    );

}

mulaiKamera();

</script>
<audio id="beep" preload="auto">
    <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" type="audio/ogg">
</audio>
</body>

</html>
