<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Absensi QR MMBC</title>

<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>

body{

font-family:Arial,sans-serif;

background:#eef2f7;

margin:0;

padding:25px;

text-align:center;

}

h2{

color:#1565c0;

font-size:34px;

margin-bottom:25px;

letter-spacing:1px;

}
#reader{

width:330px;

margin:auto;

border-radius:18px;

overflow:hidden;

box-shadow:0 10px 30px rgba(0,0,0,.18);

}
#hasil{

margin:25px auto;

padding:30px;

width:320px;

min-height:180px;

background:#ffffff;

border-radius:20px;

box-shadow:0 8px 25px rgba(0,0,0,.15);

display:flex;

flex-direction:column;

justify-content:center;

align-items:center;

transition:.35s;

font-weight:bold;

font-size:24px;

}

.sukses{

background:#2ecc71;

color:white;

}

.gagal{

background:#e74c3c;

color:white;

}

.icon{

font-size:64px;

margin-bottom:12px;

animation:pop .35s ease;

}

.judul{

font-size:30px;

font-weight:bold;

margin-bottom:12px;

text-align:center;

}

.nama{

font-size:28px;

margin-top:10px;

text-align:center;

}

.jam{

font-size:20px;

margin-top:14px;

opacity:.9;

}

@keyframes pop{

0%{

transform:scale(.5);

opacity:0;

}

70%{

transform:scale(1.15);

}

100%{

transform:scale(1);

opacity:1;

}

}

</style>

</head>

<body>

<h2>ABSENSI QR MMBC</h2>

<div id="reader"></div>

<div id="hasil">

Arahkan QR ke Kamera

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzKcfMXWKhdLhRZKNNhxjFxPZu8Pcs4OTqYxchHS4Ua4geP1lkqjv91giu7kftktbmH/exec";

const qr=new Html5Qrcode("reader");

let proses=false;

function sukses(decodedText){

if(proses)return;

proses=true;

if (navigator.vibrate) {
    navigator.vibrate([200,100,200]);
}
const beep = document.getElementById("beep");
beep.currentTime = 0;
beep.play();
document.getElementById("reader").style.opacity="0.35";

qr.pause();

const hasil=document.getElementById("hasil");

hasil.className="";

hasil.innerHTML=`
<div style="font-size:60px;">⏳</div>
<div style="font-size:28px;font-weight:bold;">
Memproses...
</div>
`;

fetch(API,{

method:"POST",

body:JSON.stringify({

id:decodedText

})

})

.then(r=>r.json())

.then(res=>{

const hasil=document.getElementById("hasil");
console.log(res);
alert(JSON.stringify(res));
hasil.className="";

if(res.sukses){

if(res.tipe=="masuk"){

hasil.className="sukses";

hasil.innerHTML=`
✅<br><br>
ABSEN MASUK BERHASIL<br><br>
${res.nama}<br><br>
${new Date().toLocaleTimeString('id-ID')}
`;

}

else{

hasil.className="sukses";

hasil.innerHTML=`
<div class="icon">👋</div>
<div class="judul">ABSEN PULANG BERHASIL</div>
<div class="nama">${res.nama}</div>
<div class="jam">${new Date().toLocaleTimeString('id-ID')}</div>
`;

}

}

else{

hasil.className="gagal";

hasil.innerHTML=`
<div class="icon">❌</div>
<div class="judul">GAGAL</div>
<div class="nama">${res.pesan}</div>
`;

}

setTimeout(()=>{

hasil.className="";

hasil.innerHTML="Arahkan QR ke Kamera";

document.getElementById("reader").style.opacity="1";

proses=false;

qr.resume();

},3000);

})

.catch(()=>{

document.getElementById("hasil").innerHTML="Server Error";

proses=false;

qr.resume();

});

}
function mulaiKamera(){

    document.getElementById("reader").style.display="block";
 document.getElementById("reader").style.opacity="1";
    qr.start(

        {
            facingMode:"environment"
        },

        {
            fps:10,
            qrbox:250
        },

        sukses

    );

}

mulaiKamera();

</script>
<audio id="beep" preload="auto">
    <source src="https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg" type="audio/ogg">
</audio>
</body>

</html>
