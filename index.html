<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MMBC QR Attendance</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    background:#eef3f8;
    font-family:Arial,sans-serif;

    display:flex;
    justify-content:center;
    align-items:center;

    min-height:100vh;

    padding:20px;

}

.container{

    width:380px;
    max-width:100%;

    background:#ffffff;

    border-radius:25px;

    padding:25px;

    box-shadow:0 15px 40px rgba(0,0,0,.15);

}

.logo{

    width:90px;
    height:90px;

    border-radius:50%;

    background:#1565c0;

    color:#ffffff;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:34px;
    font-weight:bold;

    margin:auto;

}

h1{

    margin-top:20px;

    text-align:center;

    color:#1565c0;

    font-size:30px;

}

.subtitle{

    margin-top:10px;
    margin-bottom:25px;

    text-align:center;

    color:#777;

}

#reader{

    width:100%;
    min-height:320px;

    border-radius:20px;

    border:2px dashed #90caf9;

    background:#f8fbff;

}

#hasil{

    margin-top:25px;

    min-height:230px;

    padding:25px;

    border-radius:22px;

    background:#ffffff;

    border:1px solid #e4e9f2;

    box-shadow:0 12px 30px rgba(0,0,0,.10);

    display:flex;

    justify-content:center;

    align-items:center;

    text-align:center;

    transition:all .35s ease;

}
.success{

    width:100%;

}

.success .icon{

    font-size:70px;

    margin-bottom:15px;

    animation:pop .35s ease;

}

.success .title{

    font-size:30px;

    font-weight:bold;

    color:#16a34a;

    margin-bottom:18px;

}

.success .nama{

    font-size:28px;

    font-weight:bold;

    color:#1565c0;

    margin-bottom:15px;

}

.success .jam{

    font-size:22px;

    color:#555;

}
    .error{

    width:100%;

}

.error .icon{

    font-size:70px;

    margin-bottom:15px;

}

.error .title{

    font-size:28px;

    color:#d32f2f;

    font-weight:bold;

    margin-bottom:15px;

}

.error .pesan{

    font-size:22px;

    color:#555;

}
  @keyframes pop{

0%{

transform:scale(.7);

opacity:0;

}

100%{

transform:scale(1);

opacity:1;

}

}  
 #clock{

    text-align:center;

    margin-bottom:20px;

}

#tanggal{

    color:#666;

    font-size:16px;

    margin-bottom:6px;

}

#jam{

    font-size:34px;

    font-weight:bold;

    color:#1565c0;

    letter-spacing:2px;

}   
.footer{

    margin-top:20px;

    text-align:center;

    color:#999;

    font-size:14px;

}

</style>

</head>

<body>

<div class="container">

<div class="logo">

M

</div>

<h1>

ABSENSI QR

</h1>

<div class="subtitle">

MMBC TOUR & TRAVEL

</div>
<div id="clock">

<div id="tanggal"></div>

<div id="jam"></div>

</div>
<div id="reader"></div>

<div id="hasil">
Menunggu Scan...
</div>

<div class="footer">

Version 3.0 FINAL

</div>

</div>
<script>
function beep(){

    const audio = new Audio(
    "https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
    );

    audio.play();

}
    function updateClock(){

    const now = new Date();

    const hari = [
        "Minggu",
        "Senin",
        "Selasa",
        "Rabu",
        "Kamis",
        "Jumat",
        "Sabtu"
    ];

    const bulan = [
        "Januari",
        "Februari",
        "Maret",
        "April",
        "Mei",
        "Juni",
        "Juli",
        "Agustus",
        "September",
        "Oktober",
        "November",
        "Desember"
    ];

    document.getElementById("tanggal").innerHTML =
        hari[now.getDay()] + ", " +
        now.getDate() + " " +
        bulan[now.getMonth()] + " " +
        now.getFullYear();

    document.getElementById("jam").innerHTML =
        now.toLocaleTimeString("id-ID");
}

setInterval(updateClock,1000);

updateClock();
const API = "https://script.google.com/macros/s/AKfycbzKcfMXWKhdLhRZKNNhxjFxPZu8Pcs4OTqYxchHS4Ua4geP1lkqjv91giu7kftktbmH/exec";

const qr = new Html5Qrcode("reader");
    let sedangProses = false;

qr.start(
    { facingMode: "environment" },
    {
        fps:10,
        qrbox:250
    },

    (decodedText)=>{

    if(sedangProses){
        return;
    }

    sedangProses = true;

    qr.pause();

    document.getElementById("hasil").innerHTML =
    "⏳ Memproses absensi...";

fetch("https://api.ipify.org?format=json")
.then(r => r.json())
.then(ipData => {

    return fetch(API,{
        method:"POST",
        body:JSON.stringify({
            id: decodedText,
            ip: ipData.ip
        })
    });

})
.then(r => r.json())
.then(res => {

    console.log(res);

    if(res.sukses){

        beep();

        if(navigator.vibrate){
            navigator.vibrate(300);
        }
qr.stop().then(() => {

    const reader = document.getElementById("reader");

    reader.innerHTML = "";
    reader.style.display = "none";

    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });

    setTimeout(() => {
        location.reload();
    }, 5000);

});
        // lanjutkan kode kamu yang sekarang...
                if(res.tipe=="masuk"){

                    document.getElementById("hasil").innerHTML = `
<div class="success">
    <div class="icon">✅</div>
    <div class="title">SELAMAT DATANG</div>
    <div class="nama">${res.nama}</div>
    <div class="ket">Absen Masuk Berhasil</div>
</div>
`;

                }else{

                    document.getElementById("hasil").innerHTML = `
<div class="success">
    <div class="icon">👋</div>
    <div class="title">SAMPAI JUMPA</div>
    <div class="nama">${res.nama}</div>
    <div class="ket">Absen Pulang Berhasil</div>
</div>
`;

                }

            }else{

    // Hentikan scanner
    qr.stop().then(() => {

    document.getElementById("reader").style.display = "none";

    window.scrollTo({
        top: 0,
        behavior: "smooth"
    });
setTimeout(() => {
    location.reload();
}, 5000);
});

    // Tampilkan pesan
    document.getElementById("hasil").innerHTML =
    "❌ " + res.pesan;

}
setTimeout(()=>{

    sedangProses = false;

    qr.resume();

},3000);
        })

        .catch(err=>{

            console.log(err);

            document.getElementById("hasil").innerHTML =
            "❌ Gagal mengirim data";

        });

    },

    (errorMessage)=>{
        // abaikan error scan
    }

).catch(err=>{

    console.log(err);

    document.getElementById("hasil").innerHTML =
    "❌ Gagal mengirim data";

    sedangProses = false;
    qr.resume();

});

</script>
</body>

</html>
